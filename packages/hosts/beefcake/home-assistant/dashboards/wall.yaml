title: Wall Display
views:
  - title: Home
    path: home
    type: panel
    cards:
      - type: vertical-stack
        cards:
          # Time & Date display
          - type: markdown
            content: |
              <h1 style="text-align: center; font-size: 4em; margin: 0;">{{ now().strftime('%I:%M %p') }}</h1>
              <h3 style="text-align: center; margin: 0;">{{ now().strftime('%A, %B %d, %Y') }}</h3>

          # Weather forecast
          - type: weather-forecast
            entity: weather.home
            show_forecast: true
            forecast_type: daily

          # Voice Assistant status
          - type: markdown
            content: |
              ## Voice Assistant
              Say **"Alexa"** followed by your command

          # Quick controls
          - type: horizontal-stack
            cards:
              - type: button
                name: All Lights
                icon: mdi:lightbulb-group
                show_state: false
                tap_action:
                  action: call-service
                  service: light.toggle
                  target:
                    entity_id: all
              - type: button
                name: Good Night
                icon: mdi:weather-night
                show_state: false
                tap_action:
                  action: call-service
                  service: scene.turn_on
                  target:
                    entity_id: scene.good_night
