creation_rules:
  - path_regex: secrets/[^/]+\.(ya?ml|json|env|ini)$
    key_groups:
    - age:
      - *daniel
  - path_regex: secrets/beefcake/[^/]+\.(ya?ml|json|env|ini)$
    key_groups:
    - age:
      - *daniel
      - *sshd-at-beefcake
  - path_regex: secrets/servers/[^/]+\.(ya?ml|json|env|ini)$
    key_groups:
    - age:
      - *daniel
      - *sshd-at-beefcake
      - *sshd-at-router
      - *sshd-at-dragon
      - *sshd-at-bigtower
      - *sshd-at-rascal
      - *sshd-at-steamdeck
      - *sshd-at-steamdeckoled
      - *sshd-at-pebble
      - *sshd-at-sanctuary
