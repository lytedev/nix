[[language]]
name = "rust"

[language.debugger]
command = "lldb-vscode"
name = "lldb-vscode"
transport = "stdio"

[[language.debugger.templates]]
name = "binary"
request = "launch"
[[language.debugger.templates.completion]]
completion = "filename"
name = "binary"

[language.debugger.templates.args]
initCommands = ["command script import ~/.config/lldb_vscode_rustc_primer.py"]
program = "{0}"

[[language]]
auto-format = false
file-types = ["html"]
name = "html"
scope = "source.html"

[[language]]
auto-format = true
file-types = ["nix"]
name = "nix"
scope = "source.nix"

[language.formatter]
args = ["-"]
command = "nixfmt"

[[language]]
auto-format = true
file-types = ["fish"]
name = "fish"
scope = "source.fish"

[language.indent]
tab-width = 2
unit = "\t"

[[language]]
auto-format = true
file-types = ["toml"]
name = "toml"
scope = "source.toml"

[[language]]
name = "hjson"
scope = "source.hjson"
file-types = ["hjson"]
comment-tokens = ["//", "#"]
block-comment-tokens = { start = "/*", end = "*/" }
indent = { tab-width = 2, unit = "  " }

[[grammar]]
name = "hjson"
source = { git = "https://github.com/lytedev/tree-sitter-hjson", rev = "main" }

[language-server.harper-ls]
command = "harper-ls"
args = ["--stdio"]

[language-server.rumdl]
command = "rumdl"
args = ["server"]

[[language]]
name = "markdown"
language-servers = ["marksman", "harper-ls", "rumdl"]
soft-wrap.enable = true
text-width = 80
soft-wrap.wrap-at-text-width = true
indent = { tab-width = 2, unit = "  " }

[language-server.lexical]
args = ["start"]
command = "lexical"
